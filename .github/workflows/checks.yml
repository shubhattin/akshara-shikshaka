name: App Checks

on:
  - push

env:
  VITE_BETTER_AUTH_URL: http://localhost:3000
  PG_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
  OPENAI_API_KEY: sk_proj_1234567890
  AWS_REGION: region-123
  AWS_ACCESS_KEY_ID: access-123
  AWS_SECRET_ACCESS_KEY: secret-123
  AWS_S3_FILES_BUCKET_NAME: bucket-123

jobs:
  type_build_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Generate route tree
        run: bunx tsr generate
      - name: Verify generated files are committed
        run: git diff --exit-code -- src/routeTree.gen.ts
      - run: |
          bun run check
          bun run build
